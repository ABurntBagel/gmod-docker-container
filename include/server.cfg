// Server Name
hostname "Garry's Mod Docker Server"

// RCON Settings
rcon_password "changeme"

// Network Settings
sv_allowcslua 0
sv_allowdownload 1
sv_allowupload 1
sv_lan 0
sv_region 0
sv_timeout 120
sv_password "password"

// Performance Settings
host_framerate 0
net_splitpacket_maxrate 45000
net_maxfilesize 64
decalfrequency 10
sv_maxrate 0
sv_minrate 0
sv_maxupdaterate 66
sv_minupdaterate 30
sv_maxcmdrate 66
sv_mincmdrate 30
fps_max 300
sv_parallel_sendsnapshot 1
sv_force_transmit_ents 0
sv_client_cmdrate_difference 0
sv_client_predict 1
sv_client_interpolate 1

// Physics Settings
sv_gravity 600
sv_airaccelerate 10
sv_friction 8
sv_noclipspeed 5
sv_noclipaccelerate 5

// Voice Settings
sv_voiceenable 1
sv_alltalk 1

// Download Settings
sv_downloadurl ""

// Sandbox Settings (Reduced limits for better performance)
sbox_maxprops 75
sbox_maxragdolls 25
sbox_maxnpcs 25
sbox_maxballoons 25
sbox_maxeffects 25
sbox_maxdynamite 25
sbox_maxlamps 25
sbox_maxthrusters 25
sbox_maxwheels 25
sbox_maxhoverballs 25
sbox_maxvehicles 25
sbox_maxbuttons 25
sbox_maxemitters 25

// Memory Management
mem_max_heapsize 8192
mem_max_heapsize_dedicated 8192
mem_min_heapsize 4096
mem_min_heapsize_dedicated 4096
sv_loadingurl ""
sv_hibernate_think 1
sv_hibernate_ms 5
net_maxfilesize 256

// Execute additional config files
exec banned_user.cfg
exec banned_ip.cfg